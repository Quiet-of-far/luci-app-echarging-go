name: build

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to upload assets to. Leave empty to use the latest release."
        required: false
        type: string

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            artifact: 5echarging-linux-amd64
          - goos: linux
            goarch: arm
            env: GOARM=7
            artifact: 5echarging-linux-arm
          - goos: linux
            goarch: arm64
            artifact: 5echarging-linux-arm64
          - goos: linux
            goarch: mips
            env: GOMIPS=softfloat
            artifact: 5echarging-linux-mips
          - goos: linux
            goarch: mipsle
            env: GOMIPS=softfloat
            artifact: 5echarging-linux-mipsle

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          check-latest: true

      - name: Prepare build environment
        run: mkdir -p dist

      - name: Build binary
        env:
          CGO_ENABLED: 0
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          ARTIFACT: ${{ matrix.artifact }}
        run: |
          if [ -n "${{ matrix.env || '' }}" ]; then
            export ${{ matrix.env }}
          fi
          go build -trimpath -ldflags="-s -w" -o "dist/${ARTIFACT}" .

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}

  release:
    name: Upload release assets
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Resolve release tag
        id: release_tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INPUT_RELEASE_TAG: ${{ inputs.release_tag || '' }}
          EVENT_RELEASE_TAG: ${{ github.event.release.tag_name || '' }}
        run: |
          if [ -n "$EVENT_RELEASE_TAG" ]; then
            tag="$EVENT_RELEASE_TAG"
          elif [ -n "$INPUT_RELEASE_TAG" ]; then
            tag="$INPUT_RELEASE_TAG"
          else
            tag="$(gh release view --repo "$GITHUB_REPOSITORY" --json tagName --jq .tagName)"
          fi

          if [ -z "$tag" ]; then
            echo "Unable to resolve release tag" >&2
            exit 1
          fi

          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "Resolved release tag '$tag' for event '$GITHUB_EVENT_NAME' on ref '$GITHUB_REF'"

      - name: Download artifacts
        uses: actions/download-artifact@v7
        with:
          path: dist

      - name: Flatten artifacts
        run: |
          find dist -mindepth 2 -type f -exec mv {} dist/ \;
          find dist -mindepth 1 -type d -empty -delete

      - name: Generate checksums
        run: |
          cd dist
          sha256sum 5echarging-linux-* > SHA256SUMS.txt

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_tag.outputs.tag }}
          overwrite_files: true
          files: |
            dist/5echarging-linux-*
            dist/SHA256SUMS.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
